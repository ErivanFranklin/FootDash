version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: footdash-postgres-local
    environment:
      POSTGRES_USER: footdash_user
      POSTGRES_PASSWORD: footdash_pass
      POSTGRES_DB: footdash_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U footdash_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (optional - for Socket.IO clustering)
  redis:
    image: redis:7-alpine
    container_name: footdash-redis-local
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
