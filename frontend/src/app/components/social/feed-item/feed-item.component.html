<ion-card mode="ios" (click)="onItemClick()" class="feed-item-card">
  <ion-card-content>
    <div class="card-header">
      <ion-avatar (click)="onUserClick(activity.userId, $event)">
        <div class="avatar-fallback">{{ getUserInitials() }}</div>
      </ion-avatar>

      <div class="user-info">
        <h3>
          <span class="user-name">{{ activity.userName || 'Unknown' }}</span>
        </h3>
        <p class="timestamp">
          <ion-icon name="time-outline"></ion-icon>
          {{ getTimeAgo() }}
        </p>
      </div>

      <div class="activity-badge" *ngIf="showActions">
        <ion-icon class="activity-icon" [name]="getActivityIcon()" [color]="getActivityColor()"></ion-icon>
        <ion-icon
          class="heart-icon"
          [name]="activity.activityType === ActivityType.REACTION ? 'heart' : 'heart-outline'"
          color="danger">
        </ion-icon>
      </div>
    </div>

    <div class="activity-description">
      <span class="activity-text">{{ getActivityText() }}</span>
    </div>

    <div class="metadata-container" *ngIf="shouldShowMatchLink() || activity.metadata?.content">
      <div
        class="match-preview"
        *ngIf="shouldShowMatchLink()"
        (click)="onMatchClick(activity.metadata.matchId, $event)">
        <ion-icon name="football-outline"></ion-icon>
        <span class="match-name">{{ activity.metadata.matchName }}</span>
        <ion-icon name="chevron-forward-outline" class="go-icon"></ion-icon>
      </div>

      <div *ngIf="activity.metadata?.content" class="content-text">
        "{{ activity.metadata.content }}"
      </div>
    </div>
  </ion-card-content>
</ion-card>
