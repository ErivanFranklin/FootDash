<ion-app>
  <ng-container *ngIf="authService.isAuthenticated$ | async; else unauthLayout">
    <ion-split-pane contentId="main-content" when="lg">

      <ion-menu contentId="main-content">
        <ion-header>
          <ion-toolbar>
            <ion-title>FootDash</ion-title>
          </ion-toolbar>
        </ion-header>
        <ion-content>
          <app-navigation-menu></app-navigation-menu>
        </ion-content>
      </ion-menu>

      <div class="ion-page" id="main-content">
        <ion-router-outlet></ion-router-outlet>

        <!-- Mobile Bottom Tab Bar -->
        <ion-footer class="mobile-tabs ion-hide-lg-up ion-no-border">
          <ion-toolbar>
            <div class="tab-bar">
              <a class="tab-button" routerLink="/home" routerLinkActive="tab-active">
                <ion-icon name="home"></ion-icon>
                <span>{{ 'NAV.HOME' | transloco }}</span>
              </a>
              <a class="tab-button" routerLink="/teams" routerLinkActive="tab-active">
                <ion-icon name="people"></ion-icon>
                <span>{{ 'NAV.TEAMS' | transloco }}</span>
              </a>
              <a class="tab-button" routerLink="/feed" routerLinkActive="tab-active">
                <ion-icon name="chatbubbles"></ion-icon>
                <span>{{ 'NAV.FEED' | transloco }}</span>
              </a>
              <a class="tab-button" *ngIf="currentUserId" [routerLink]="['/user-profile', currentUserId]" routerLinkActive="tab-active" [routerLinkActiveOptions]="{ exact: true }">
                <ion-icon name="person"></ion-icon>
                <span>{{ 'NAV.PROFILE' | transloco }}</span>
              </a>
            </div>
          </ion-toolbar>
        </ion-footer>
      </div>

    </ion-split-pane>
  </ng-container>

  <!-- Unauthenticated: plain router outlet with no menu/tabs -->
  <ng-template #unauthLayout>
    <div class="ion-page">
      <ion-router-outlet></ion-router-outlet>
    </div>
  </ng-template>

  <!-- Offline indicator — shown in all layouts -->
  <app-offline-banner></app-offline-banner>
</ion-app>
