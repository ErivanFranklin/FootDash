<app-page-header
  title="Teams"
  [actions]="[{ label: 'Refresh', handler: refreshTeams.bind(this), icon: 'refresh', loading: loading }]">
</app-page-header>

<ion-content [fullscreen]="true">
  <div style="padding: 12px 12px 0 12px;">
    <ion-segment [value]="filterMode" (ionChange)="onFilterChange($event)">
      <ion-segment-button value="all">
        <ion-label>All</ion-label>
      </ion-segment-button>
      <ion-segment-button value="favorites">
        <ion-label>Favorites</ion-label>
      </ion-segment-button>
    </ion-segment>
  </div>

  <!-- Loading skeletons (initial load only) -->
  <div style="padding: 12px;" *ngIf="loading && !visibleTeams.length">
    <ion-list lines="none">
      <ion-item *ngFor="let i of [1,2,3]">
        <ion-skeleton-text animated style="width: 100%; height: 120px; border-radius: 8px; margin-bottom: 12px;"></ion-skeleton-text>
      </ion-item>
    </ion-list>
  </div>

  <!-- Empty state -->
  <div style="padding: 12px;" *ngIf="!visibleTeams.length && !loading">
    {{ filterMode === 'favorites' ? 'No favorite teams yet.' : 'No teams found.' }}
  </div>

  <!-- Teams list -->
  <div style="padding: 12px;">
    <app-team-card
      *ngFor="let team of visibleTeams; trackBy: trackByTeamId"
      [team]="team"
      [showDetails]="false"
      [favoriteEntityType]="'team'"
      [favoriteEntityId]="resolveTeamId(team)"
      [actions]="getTeamActions(team)">
    </app-team-card>
  </div>

  <!-- Infinite Scroll -->
  <ion-infinite-scroll
    threshold="200px"
    (ionInfinite)="loadMore($event)"
    *ngIf="filterMode === 'all' && hasMoreData && !loading"
    [disabled]="filterMode !== 'all' || !hasMoreData">
    <ion-infinite-scroll-content
      loadingSpinner="bubbles"
      loadingText="Loading more teams...">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
