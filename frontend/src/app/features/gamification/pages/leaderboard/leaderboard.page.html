<app-page-header [title]="'LEADERBOARD.TITLE' | transloco" />

<ion-content>
  <div class="filter-container">
    <ion-segment [value]="selectedScope" (ionChange)="onScopeChange($event)" mode="ios">
      <ion-segment-button value="global">
        <ion-label>Global</ion-label>
      </ion-segment-button>
      <ion-segment-button value="friends">
        <ion-label>Friends</ion-label>
      </ion-segment-button>
    </ion-segment>

    <ion-segment [value]="selectedPeriod" (ionChange)="onPeriodChange($event)" mode="ios">
      <ion-segment-button value="weekly">
        <ion-label>{{ 'LEADERBOARD.WEEKLY' | transloco }}</ion-label>
      </ion-segment-button>
      <ion-segment-button value="monthly">
        <ion-label>{{ 'LEADERBOARD.MONTHLY' | transloco }}</ion-label>
      </ion-segment-button>
      <ion-segment-button value="all-time">
        <ion-label>{{ 'LEADERBOARD.ALL_TIME' | transloco }}</ion-label>
      </ion-segment-button>
    </ion-segment>
  </div>

  <div *ngIf="isLoading" class="ion-text-center ion-padding">
    <ion-spinner></ion-spinner>
    <p>{{ 'COMMON.LOADING' | transloco }}</p>
  </div>

  <ion-list *ngIf="!isLoading">
    <ion-item *ngFor="let entry of displayedLeaderboard">
      <ion-label slot="start" class="rank-label" [class.top-3]="entry.rank <= 3">
        #{{ entry.rank }}
      </ion-label>
      <ion-avatar slot="start">
        <img
          *ngIf="entry.avatarUrl; else avatarInitials"
          [src]="entry.avatarUrl"
          [alt]="entry.userName"
          (error)="onAvatarError($event)" />
        <ng-template #avatarInitials>
          <div class="avatar-fallback">{{ getInitials(entry.userName) }}</div>
        </ng-template>
      </ion-avatar>
      <ion-label class="user-label">
        <h2>{{ entry.userName }}</h2>
      </ion-label>
      <ion-note slot="end" color="primary" class="points-label">
        {{ entry.points }} pts
      </ion-note>
    </ion-item>

    <ion-item *ngIf="displayedLeaderboard.length === 0">
      <ion-label color="medium">No friends ranked yet.</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
